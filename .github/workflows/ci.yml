name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  windows-build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-freetype
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-binutils
      - name: Build Windows binary
        run: cmd /c builder\build_win.cmd
      - uses: actions/upload-artifact@v4
        with:
          name: font2c-windows
          path: font2c.exe

  linux-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libfreetype6-dev
      - run: bash builder/build_posix.sh
      - uses: actions/upload-artifact@v4
        with:
          name: font2c-linux
          path: font2c
