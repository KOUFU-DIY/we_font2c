name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-freetype
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-binutils
      - name: Build Windows binary
        shell: cmd
        run: builder\build_win.cmd
      - uses: actions/upload-artifact@v4
        with:
          name: font2c-windows
          path: font2c.exe

  macos-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          brew update
          brew install pkg-config freetype
          echo "PKG_CONFIG_PATH=$(brew --prefix freetype)/lib/pkgconfig:${PKG_CONFIG_PATH}" >> $GITHUB_ENV
      - name: Build macOS binary
        run: bash builder/build_posix.sh
      - uses: actions/upload-artifact@v4
        with:
          name: font2c-macos
          path: font2c
