name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-freetype
            mingw-w64-x86_64-bzip2
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-binutils
      - name: Build Windows binary
        shell: cmd
        run: builder\build_win.cmd
      - name: Stage Windows asset
        run: |
          mkdir -p dist
          cp font2c.exe "dist/font2c-${GITHUB_REF_NAME}-windows.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: font2c-windows
          path: dist/font2c-*-windows.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          brew update
          brew install pkg-config freetype
          echo "PKG_CONFIG_PATH=$(brew --prefix freetype)/lib/pkgconfig:${PKG_CONFIG_PATH}" >> $GITHUB_ENV
      - name: Build macOS binary
        run: bash builder/build_posix.sh
      - name: Stage macOS asset
        shell: bash
        run: |
          mkdir -p dist
          cp font2c "dist/font2c-${GITHUB_REF_NAME}-macos"
      - uses: actions/upload-artifact@v4
        with:
          name: font2c-macos
          path: dist/font2c-*-macos

  publish:
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          overwrite_files: true
