name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-freetype
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-binutils
      - name: Build Windows binary
        run: cmd /c builder\build_win.cmd
      - name: Stage Windows asset
        run: |
          mkdir -p dist
          cp font2c.exe "dist/font2c-${GITHUB_REF_NAME}-windows.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: font2c-windows
          path: dist/font2c-*-windows.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libfreetype6-dev
      - name: Build Linux binary
        run: bash builder/build_posix.sh
      - name: Stage Linux asset
        run: |
          mkdir -p dist
          cp font2c "dist/font2c-${GITHUB_REF_NAME}-linux"
      - uses: actions/upload-artifact@v4
        with:
          name: font2c-linux
          path: dist/font2c-*-linux

  publish:
    needs:
      - build-windows
      - build-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
